# New-API Docker Compose Configuration (Port 3005)
# 
# Quick Start:
#   1. docker-compose -f docker-compose-3005.yml up -d
#   2. Access at http://localhost:3005
#
# ??  IMPORTANT: This is a separate instance from the one on port 3001

version: '3.4'

services:
  new-api-3005:
    image: calciumion/new-api:latest
    container_name: new-api-3005
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3005:3000"
    volumes:
      - ./data-3005:/data
      - ./logs-3005:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres-3005:5432/new-api
      - REDIS_CONN_STRING=redis://redis-3005
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true

    depends_on:
      - redis-3005
      - postgres-3005
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-3005:
    image: redis:latest
    container_name: redis-3005
    restart: always

  postgres-3005:
    image: postgres:15
    container_name: postgres-3005
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - pg_data_3005:/var/lib/postgresql/data

volumes:
  pg_data_3005:
