# New-API Docker Compose Configuration - Local Build (Port 3005)
# 
# Quick Start:
#   docker-compose -f docker-compose-local-3005.yml up -d --build
#
# This builds from local source code with your modifications

version: '3.4'

services:
  new-api-local-3005:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api-local:3005
    container_name: new-api-local-3005
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3005:3000"
    volumes:
      - ./data-local-3005:/data
      - ./logs-local-3005:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres-local-3005:5432/new-api
      - REDIS_CONN_STRING=redis://redis-local-3005
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true

    depends_on:
      - redis-local-3005
      - postgres-local-3005
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis-local-3005:
    image: redis:latest
    container_name: redis-local-3005
    restart: always

  postgres-local-3005:
    image: postgres:15
    container_name: postgres-local-3005
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - pg_data_local_3005:/var/lib/postgresql/data

volumes:
  pg_data_local_3005:
